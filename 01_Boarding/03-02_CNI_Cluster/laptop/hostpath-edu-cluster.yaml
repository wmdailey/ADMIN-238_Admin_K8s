# Exercise 03-02 v3.2.0
#
# The hostPath must be hard coded to the Users home directory.
# Edit as required.
---
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: edu
networking:
  disableDefaultCNI: true
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"

nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        system-reserved: "memory=4Gi"
  labels:
    ingress-ready: "true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 443 
    hostPort: 443
    listenAddress: "127.0.0.1"
    protocol: TCP
  # --- SECURE MOUNT START ---
  extraMounts:
  - hostPath: /Users/wdailey/.docker/config.json
    containerPath: /var/lib/kubelet/config.json
    readOnly: true
  # --- SECURE MOUNT END ---

- role: worker
  kubeadmConfigPatches: &worker_patch
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        system-reserved: "memory=4Gi"
  extraMounts:
  - hostPath: /Users/wdailey/.docker/config.json
    containerPath: /var/lib/kubelet/config.json
    readOnly: true

- role: worker
  kubeadmConfigPatches: *worker_patch
  extraMounts:
  - hostPath: /Users/wdailey/.docker/config.json
    containerPath: /var/lib/kubelet/config.json
    readOnly: true

- role: worker
  kubeadmConfigPatches: *worker_patch
  extraMounts:
  - hostPath: /Users/wdailey/.docker/config.json
    containerPath: /var/lib/kubelet/config.json
    readOnly: true
